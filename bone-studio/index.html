<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bone Studio — Fossil Dig</title>
  <style>
    :root {
      --covered: #5c422e;
      --dug-empty: #8f7355;
      --bone-bg: #6b4c32;
      --accent: #c9a227;
      --text: #f4f1ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #1a1410;
      color: var(--text);
    }

    #start-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: linear-gradient(160deg, #1e2a24 0%, #0f1418 50%, #1a1520 100%);
    }

    #start-screen::before {
      content: "⛏️";
      position: absolute;
      font-size: clamp(8rem, 35vw, 18rem);
      opacity: 0.12;
      transform: rotate(-18deg) translate(-8%, -12%);
      pointer-events: none;
      user-select: none;
    }

    #start-screen::after {
      content: "⛏️";
      position: absolute;
      font-size: clamp(5rem, 22vw, 11rem);
      opacity: 0.08;
      right: -5%;
      bottom: 10%;
      transform: rotate(22deg);
      pointer-events: none;
      user-select: none;
    }

    #start-screen h1 {
      position: relative;
      z-index: 1;
      margin: 0 0 0.5rem;
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      letter-spacing: 0.04em;
    }

    #start-screen p {
      position: relative;
      z-index: 1;
      margin: 0 0 2rem;
      opacity: 0.85;
      max-width: 22rem;
      text-align: center;
      line-height: 1.5;
    }

    #btn-start {
      position: relative;
      z-index: 1;
      padding: 0.85rem 2.25rem;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: linear-gradient(180deg, #e8c84a, var(--accent));
      color: #1a1408;
      box-shadow: 0 4px 20px rgba(201, 162, 39, 0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    #btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(201, 162, 39, 0.45);
    }

    #btn-start:active {
      transform: translateY(0);
    }

    #game-screen {
      min-height: 100vh;
      min-height: 100dvh;
      height: 100dvh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: 0.5rem 0.5rem 0.35rem;
      gap: 0.5rem;
      background: #221a14;
    }

    #game-screen[hidden] {
      display: none !important;
    }

    #start-screen[hidden] {
      display: none !important;
    }

    #hud {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      flex-shrink: 0;
    }

    #grid-stage {
      flex: 1;
      min-height: 0;
      width: 100%;
      container-type: size;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #btn-menu {
      padding: 0.45rem 1rem;
      font-size: 0.95rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    #btn-menu:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    #depth-label {
      font-size: 0.9rem;
      opacity: 0.85;
      padding: 0.35rem 0.75rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #grid-wrap {
      position: relative;
      --gap: 3px;
      --pad: 3px;
      --cell: min(
        calc((100cqw - 9 * var(--gap) - 2 * var(--pad)) / 10),
        calc((100cqh - 4 * var(--gap) - 2 * var(--pad)) / 5)
      );
      width: calc(10 * var(--cell) + 9 * var(--gap) + 2 * var(--pad));
      height: calc(5 * var(--cell) + 4 * var(--gap) + 2 * var(--pad));
      max-width: 100%;
      max-height: 100%;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(10, var(--cell));
      grid-template-rows: repeat(5, var(--cell));
      gap: var(--gap);
      background: #3d2a1c;
      padding: var(--pad);
      border-radius: 10px;
      border: 2px solid rgba(201, 162, 39, 0.35);
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    #grid.lower-area {
      background: #342818;
      border-color: rgba(140, 200, 255, 0.35);
    }

    .cell {
      width: var(--cell);
      height: var(--cell);
      background: var(--covered);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(var(--cell) * 0.45);
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .cell.dug:not(.has-bone) {
      background: var(--dug-empty);
    }

    .cell.dug.has-bone {
      background: var(--bone-bg);
    }

    .cell.dig-flash {
      animation: dig-pulse 0.35s ease;
    }

    @keyframes dig-pulse {
      0% { transform: scale(1); filter: brightness(1); }
      40% { transform: scale(0.92); filter: brightness(1.35); }
      100% { transform: scale(1); filter: brightness(1); }
    }

    #cat {
      position: absolute;
      width: var(--cell);
      height: var(--cell);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(var(--cell) * 0.5);
      pointer-events: none;
      z-index: 2;
      transition: left 0.08s ease-out, top 0.08s ease-out;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.4));
    }

    .hint {
      font-size: 0.8rem;
      opacity: 0.65;
      text-align: center;
      max-width: 28rem;
      line-height: 1.45;
      flex-shrink: 0;
      margin: 0 auto;
      padding: 0 0.25rem;
    }

    .start-account {
      position: relative;
      z-index: 1;
      margin: 1.25rem 0 0;
      font-size: 0.88rem;
      opacity: 0.88;
      text-align: center;
      max-width: 22rem;
      line-height: 1.5;
    }

    .start-account a {
      color: #e8c84a;
    }

    .start-account a:hover {
      color: #fff;
    }

    #user-label {
      font-size: 0.85rem;
      opacity: 0.8;
      padding: 0.35rem 0.75rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      max-width: 12rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

  </style>
</head>
<body>
  <div id="start-screen">
    <h1>Bone Studio</h1>
    <p>Dig for hidden fossils with your cat. Arrow keys to move — Space or Enter to dig.</p>
    <button type="button" id="btn-start">Start Game</button>
    <p class="start-account">Playing as <strong id="start-user-name">Guest</strong>. <a href="../index.html">Account</a> on the home page.</p>
  </div>

  <div id="game-screen" hidden>
    <div id="hud">
      <span id="user-label" title="">Player: Guest</span>
      <span id="depth-label" aria-live="polite">Shallow dig</span>
      <button type="button" id="btn-menu">Main menu</button>
    </div>
    <div id="grid-stage">
      <div id="grid-wrap">
        <div id="grid" aria-label="Dig site grid"></div>
        <div id="cat" aria-hidden="true">🐱</div>
      </div>
    </div>
    <p class="hint">Uncover every bone on both layers to win. Press Down past the bottom row to drop deeper; Up from the top row to climb back.</p>
  </div>

  <script src="../account.js"></script>
  <script>
    const COLS = 10;
    const ROWS = 5;
    const NUM_AREAS = 2;

    let areas = [];
    let areaIndex = 0;
    let playerCol = 0;
    let playerRow = 0;
    let gameActive = false;

    const startScreen = document.getElementById("start-screen");
    const gameScreen = document.getElementById("game-screen");
    const gridEl = document.getElementById("grid");
    const catEl = document.getElementById("cat");
    const depthLabelEl = document.getElementById("depth-label");
    const startUserNameEl = document.getElementById("start-user-name");
    const userLabelEl = document.getElementById("user-label");

    function refreshAccountLabels() {
      const u =
        typeof SiteAuth !== "undefined" && SiteAuth.getCurrentUser
          ? SiteAuth.getCurrentUser()
          : null;
      const label = u || "Guest";
      if (startUserNameEl) startUserNameEl.textContent = label;
      if (userLabelEl) {
        userLabelEl.textContent = "Player: " + label;
        userLabelEl.title = label;
      }
    }

    function showStartScreen() {
      startScreen.hidden = false;
      gameScreen.hidden = true;
      gameActive = false;
      refreshAccountLabels();
    }

    function showGameScreen() {
      startScreen.hidden = true;
      gameScreen.hidden = false;
      gameActive = true;
      refreshAccountLabels();
    }

    function createEmptyGrid() {
      const g = [];
      for (let r = 0; r < ROWS; r++) {
        const row = [];
        for (let c = 0; c < COLS; c++) {
          row.push({ hasBone: false, isDug: false });
        }
        g.push(row);
      }
      return g;
    }

    function currentGrid() {
      return areas[areaIndex];
    }

    function randomInt(min, max) {
      return min + Math.floor(Math.random() * (max - min + 1));
    }

    function inBounds(c, r) {
      return c >= 0 && c < COLS && r >= 0 && r < ROWS;
    }

    function canPlaceSegment(cells, g) {
      for (const [c, r] of cells) {
        if (!inBounds(c, r)) return false;
        if (g[r][c].hasBone) return false;
      }
      return true;
    }

    function markBones(cells, g) {
      for (const [c, r] of cells) {
        g[r][c].hasBone = true;
      }
    }

    function generateBonesForGrid(g) {
      const occupied = () => {
        let n = 0;
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            if (g[r][c].hasBone) n++;
          }
        }
        return n;
      };

      const maxCells = COLS * ROWS;
      const targetMin = 14;
      const targetMax = 20;
      const target = randomInt(targetMin, Math.min(targetMax, maxCells));

      let attempts = 0;
      while (occupied() < target && attempts < 400) {
        attempts++;
        const len = randomInt(1, 3);
        const horizontal = Math.random() < 0.5;
        const sc = randomInt(0, COLS - 1);
        const sr = randomInt(0, ROWS - 1);
        const cells = [];
        for (let i = 0; i < len; i++) {
          const c = horizontal ? sc + i : sc;
          const r = horizontal ? sr : sr + i;
          cells.push([c, r]);
        }
        if (canPlaceSegment(cells, g)) {
          markBones(cells, g);
        }
      }

      if (occupied() === 0) {
        g[1][3].hasBone = true;
        g[1][4].hasBone = true;
        g[2][5].hasBone = true;
      }
    }

    function countUndugBones() {
      let n = 0;
      for (let a = 0; a < areas.length; a++) {
        const g = areas[a];
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const cell = g[r][c];
            if (cell.hasBone && !cell.isDug) n++;
          }
        }
      }
      return n;
    }

    function updateDepthLabel() {
      depthLabelEl.textContent =
        areaIndex === 0 ? "Shallow dig" : "Deeper dig";
    }

    function positionCat() {
      const gap = 3;
      const pad = 3;
      const cellPx = catEl.parentElement.querySelector(".cell");
      const cellSize = cellPx ? cellPx.getBoundingClientRect().width : 56;
      const step = cellSize + gap;
      catEl.style.left = pad + playerCol * step + "px";
      catEl.style.top = pad + playerRow * step + "px";
    }

    function renderGrid() {
      const grid = currentGrid();
      gridEl.classList.toggle("lower-area", areaIndex > 0);
      gridEl.innerHTML = "";
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = grid[r][c];
          const div = document.createElement("div");
          div.className = "cell";
          div.dataset.col = String(c);
          div.dataset.row = String(r);
          if (cell.isDug) {
            div.classList.add("dug");
            if (cell.hasBone) {
              div.classList.add("has-bone");
              div.textContent = "🦴";
            }
          }
          gridEl.appendChild(div);
        }
      }
      requestAnimationFrame(() => positionCat());
    }

    function handleMovement(dcol, drow) {
      if (!gameActive) return;
      const nc = playerCol + dcol;
      const nr = playerRow + drow;

      if (drow === 1 && playerRow === ROWS - 1 && areaIndex < NUM_AREAS - 1) {
        areaIndex++;
        playerRow = 0;
        renderGrid();
        updateDepthLabel();
        return;
      }
      if (drow === -1 && playerRow === 0 && areaIndex > 0) {
        areaIndex--;
        playerRow = ROWS - 1;
        renderGrid();
        updateDepthLabel();
        return;
      }

      if (!inBounds(nc, nr)) return;
      playerCol = nc;
      playerRow = nr;
      positionCat();
    }

    function handleDig() {
      if (!gameActive) return;
      const grid = currentGrid();
      const cell = grid[playerRow][playerCol];
      if (cell.isDug) return;

      cell.isDug = true;
      renderGrid();
      const tile = gridEl.querySelector(
        `.cell[data-col="${playerCol}"][data-row="${playerRow}"]`
      );
      if (tile) {
        tile.classList.add("dig-flash");
        setTimeout(() => tile.classList.remove("dig-flash"), 350);
      }
      checkWinCondition();
    }

    function checkWinCondition() {
      if (countUndugBones() !== 0) return;
      gameActive = false;
      const msg =
        "Congratulations! You uncovered every bone.\n\nReturn to the start screen?";
      const ok = window.confirm(msg);
      if (ok) {
        resetToMenu();
      } else {
        initGame();
      }
    }

    function resetToMenu() {
      playerCol = 0;
      playerRow = 0;
      areaIndex = 0;
      showStartScreen();
    }

    function initGame() {
      areas = [];
      for (let i = 0; i < NUM_AREAS; i++) {
        const g = createEmptyGrid();
        generateBonesForGrid(g);
        areas.push(g);
      }
      areaIndex = 0;
      playerCol = 0;
      playerRow = 0;
      gameActive = true;
      updateDepthLabel();
      renderGrid();
    }

    function onKeyDown(e) {
      if (gameScreen.hidden || !gameActive) return;

      const k = e.key;
      if (k === "ArrowUp") {
        e.preventDefault();
        handleMovement(0, -1);
      } else if (k === "ArrowDown") {
        e.preventDefault();
        handleMovement(0, 1);
      } else if (k === "ArrowLeft") {
        e.preventDefault();
        handleMovement(-1, 0);
      } else if (k === "ArrowRight") {
        e.preventDefault();
        handleMovement(1, 0);
      } else if (k === " " || k === "Enter") {
        if (k === " ") e.preventDefault();
        handleDig();
      }
    }

    document.getElementById("btn-start").addEventListener("click", () => {
      showGameScreen();
      initGame();
    });

    document.getElementById("btn-menu").addEventListener("click", () => {
      if (!gameScreen.hidden) resetToMenu();
    });

    window.addEventListener("keydown", onKeyDown);
    window.addEventListener("resize", () => {
      if (!gameScreen.hidden) positionCat();
    });

    window.addEventListener("storage", (e) => {
      if (e.key === "austinziolo_session_v1") refreshAccountLabels();
    });

    refreshAccountLabels();
    showStartScreen();
  </script>
</body>
</html>
