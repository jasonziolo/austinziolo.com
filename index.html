<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>austinziolo.com</title>
  <style>
    :root {
      --bg: #1a1410;
      --card: #261c16;
      --border: rgba(201, 162, 39, 0.25);
      --accent: #c9a227;
      --text: #f4f1ea;
      --muted: rgba(244, 241, 234, 0.65);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .shell {
      max-width: 36rem;
      margin: 0 auto;
      padding: 1.5rem 1rem 2rem;
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.65rem;
    }

    .tagline {
      margin: 0 0 1.5rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    h2 {
      margin: 1.5rem 0 0.65rem;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .account-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.15rem 1.15rem;
    }

    .account-panel h2 {
      margin: 0 0 0.75rem;
      font-size: 1.05rem;
    }

    .account-panel label {
      display: block;
      font-size: 0.82rem;
      margin-bottom: 0.2rem;
      color: var(--muted);
    }

    .account-panel input {
      width: 100%;
      margin-bottom: 0.65rem;
      padding: 0.5rem 0.6rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      font-size: 1rem;
    }

    .account-panel input:focus {
      outline: 2px solid rgba(201, 162, 39, 0.45);
      outline-offset: 1px;
    }

    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.35rem;
    }

    .account-panel button {
      padding: 0.5rem 1rem;
      font-size: 0.95rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      cursor: pointer;
    }

    .account-panel button:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .account-panel button.primary {
      background: linear-gradient(180deg, #e8c84a, var(--accent));
      color: #1a1408;
      border-color: transparent;
      font-weight: 600;
    }

    .account-panel button.primary:hover {
      filter: brightness(1.05);
    }

    #auth-msg {
      min-height: 1.25rem;
      margin: 0.5rem 0 0;
      font-size: 0.88rem;
      color: #f0a8a8;
    }

    #auth-msg:empty {
      display: none;
    }

    .auth-switch {
      margin: 0.75rem 0 0;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .auth-switch button {
      padding: 0;
      border: none;
      background: none;
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
      font: inherit;
    }

    .auth-switch button:hover {
      background: none;
      filter: brightness(1.1);
    }

    .fine-print {
      margin: 0.75rem 0 0;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.4;
    }

    #auth-welcome {
      display: none;
    }

    #auth-welcome.visible {
      display: block;
    }

    #auth-welcome strong {
      color: #fff;
    }

    #auth-forms.hidden {
      display: none;
    }

    ul.games {
      margin: 0;
      padding-left: 1.25rem;
    }

    ul.games a {
      color: #e8d4a8;
    }

    ul.games a:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>austinziolo.com</h1>
    <p class="tagline">Sign in once on this device; Bone Studio will show your name.</p>

    <section class="account-panel" aria-labelledby="account-heading">
      <h2 id="account-heading">Account</h2>

      <div id="auth-welcome">
        <p>Signed in as <strong id="welcome-name"></strong>.</p>
        <div class="row-actions">
          <button type="button" id="btn-logout">Log out</button>
        </div>
      </div>

      <div id="auth-forms">
        <div id="login-block">
          <label for="login-user">Username</label>
          <input type="text" id="login-user" autocomplete="username" maxlength="20">

          <label for="login-pass">Password</label>
          <input type="password" id="login-pass" autocomplete="current-password">

          <div class="row-actions">
            <button type="button" class="primary" id="btn-login">Sign in</button>
          </div>
        </div>

        <div id="register-block" hidden>
          <label for="reg-user">Username</label>
          <input type="text" id="reg-user" autocomplete="username" maxlength="20">

          <label for="reg-pass">Password</label>
          <input type="password" id="reg-pass" autocomplete="new-password">

          <label for="reg-pass2">Confirm password</label>
          <input type="password" id="reg-pass2" autocomplete="new-password">

          <div class="row-actions">
            <button type="button" class="primary" id="btn-register">Create account</button>
          </div>
        </div>

        <p id="auth-msg" role="status"></p>

        <p class="auth-switch">
          <span id="switch-label">Need an account?</span>
          <button type="button" id="btn-toggle-mode">Register</button>
        </p>

        <p class="fine-print">
          Accounts are stored only in this browser (localStorage), for fun on this site. Do not reuse an important password.
        </p>
      </div>
    </section>

    <h2>Games</h2>
    <ul class="games">
      <li><a href="bone-studio/index.html">Bone Studio</a></li>
      <li><a href="dragon-lair/index.html">Dragon Lair</a></li>
    </ul>
  </div>

  <script src="account.js"></script>
  <script>
    (function () {
      const authForms = document.getElementById("auth-forms");
      const authWelcome = document.getElementById("auth-welcome");
      const welcomeName = document.getElementById("welcome-name");
      const authMsg = document.getElementById("auth-msg");
      const loginBlock = document.getElementById("login-block");
      const registerBlock = document.getElementById("register-block");
      const switchLabel = document.getElementById("switch-label");
      const btnToggle = document.getElementById("btn-toggle-mode");
      let registerMode = false;

      function setMsg(text) {
        authMsg.textContent = text || "";
      }

      function refreshPanel() {
        const user = window.SiteAuth.getCurrentUser();
        if (user) {
          authWelcome.classList.add("visible");
          authForms.classList.add("hidden");
          welcomeName.textContent = user;
          setMsg("");
        } else {
          authWelcome.classList.remove("visible");
          authForms.classList.remove("hidden");
          welcomeName.textContent = "";
        }
      }

      function setRegisterMode(on) {
        registerMode = on;
        loginBlock.hidden = on;
        registerBlock.hidden = !on;
        if (on) {
          switchLabel.textContent = "Already have an account?";
          btnToggle.textContent = "Sign in";
        } else {
          switchLabel.textContent = "Need an account?";
          btnToggle.textContent = "Register";
        }
        setMsg("");
      }

      document.getElementById("btn-login").addEventListener("click", function () {
        const username = document.getElementById("login-user").value;
        const password = document.getElementById("login-pass").value;
        const r = window.SiteAuth.login(username, password);
        if (!r.ok) {
          setMsg(r.error);
          return;
        }
        document.getElementById("login-pass").value = "";
        refreshPanel();
      });

      document.getElementById("btn-register").addEventListener("click", function () {
        const username = document.getElementById("reg-user").value;
        const password = document.getElementById("reg-pass").value;
        const confirmPassword = document.getElementById("reg-pass2").value;
        const r = window.SiteAuth.register(username, password, confirmPassword);
        if (!r.ok) {
          setMsg(r.error);
          return;
        }
        document.getElementById("reg-pass").value = "";
        document.getElementById("reg-pass2").value = "";
        refreshPanel();
      });

      document.getElementById("btn-logout").addEventListener("click", function () {
        window.SiteAuth.logout();
        refreshPanel();
      });

      btnToggle.addEventListener("click", function () {
        setRegisterMode(!registerMode);
      });

      window.addEventListener("storage", function (e) {
        if (e.key === "austinziolo_session_v1") refreshPanel();
      });

      refreshPanel();
    })();
  </script>
</body>
</html>
